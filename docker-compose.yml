services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Kiri (Host/DBeaver): 5433 | Kanan (Dalam Docker): 5432
      - "5433:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data

  etl_app:
    build: .
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # etl_app tetap pakai 5432 karena dia bicara lewat jaringan internal Docker
      POSTGRES_PORT: 5432 
    volumes:
      - ./data:/app/data
    depends_on:
      - db

volumes:
  postgres_data: